# Video options
fs=yes
ytdl-format=best*[height<=?1080]+bestaudio
hwdec=auto-safe
sharpen=4
# Image viewer options
image-display-duration=5
loop-file=inf
## General
osd-duration=6000
osd-font-size=18
osd-color='#F37878'
osd-border-color='#000000'
osd-border-size=3
no-osd-bar
osd-align-x=right
osd-align-y=bottom
## Subtitles options
sub-pos=7
sub-align-y=top
sub-ass-justify=yes
sub-justify=left
sub-font='Source Sans Bold'
sub-font-size=16
sub-color='#7a86b6'
sub-border-color=0/0/0/0.4
sub-border-size=2
sub-ass-override=strip
